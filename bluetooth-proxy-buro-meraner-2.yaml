---
substitutions:
  name: bluetooth-proxy-bm-2
  friendly_name: bluetooth-proxy-buro-meraner-2
  device_static_ip: !secret bluetooth_proxy_bm_2_wifi_manual_ip_static_ip
  device_ap_ssid: !secret bluetooth_proxy_bm_2_wifi_ap_ssid
  device_ap_password: !secret bluetooth_proxy_bm_2_wifi_ap_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_manual_ip_gateway: !secret wifi_manual_ip_gateway
  wifi_manual_ip_subnet: !secret wifi_manual_ip_subnet
  api_encryption_key: !secret bluetooth_proxy_bm_2_esp_api_encryption_key
  esp_ota_password: !secret bluetooth_proxy_bm_2_esp_ota_password
  manifest_url: https://firmware.esphome.io/bluetooth-proxy/m5stack-atom-lite/manifest.json
  dashboard_import: github://esphome/bluetooth-proxies/m5stack/m5stack-atom-lite.yaml@main
  board: m5stack-atom

packages:
  bt_proxy: !include packages/device-configs/bluetooth-proxy.yaml
  wifi-roaming: !include packages/wifi-roaming-11kv.yaml   # ESP32+esp-idf only
