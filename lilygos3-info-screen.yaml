binary_sensor:
  # Button Up
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: "Button Up"
    setup_priority: ${peripherals_boot_priority}
    on_multi_click:
      - timing:
          - ON FOR AT LEAST 500ms
        then:
          switch.toggle: backlight_on_bat
  # Button Down
  - platform: gpio
    pin:
      number: GPIO14
      allow_other_uses: true
      inverted: true
    name: "Button Down"
    setup_priority: ${peripherals_boot_priority}
  # Charging from cable
  - platform: template
    id: is_charging
    name: Charging From Cable
    on_state:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    # No lambda here; state is published from battery_level sensor
  # True when sleep mode is enabled (device might be still awake, displays leaf icon on screen)
  - platform: template
    id: in_power_saving_mode
    icon: mdi:leaf
    name: In power saving mode
    lambda: return id(sleep_mode_enabled) == true;
    on_state:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
  # True when device is in deep sleep (to track in Home Assistant)
  - platform: template
    id: in_deep_sleep
    icon: mdi:sleep
    setup_priority: ${deep_sleep_priority}
    name: In deep sleep
    entity_category: diagnostic
  # Pir occupancy sensor
  - platform: homeassistant
    id: pir_occupancy
    entity_id: ${pir_occupancy_sensor_id}
    internal: true
  # True when screen is on (diagnostic to track in Home Assistant)
  - platform: template
    name: Screen is On
    id: screen_is_on
    icon: mdi:television
    lambda: return id(backlight).state || id(is_charging).state;
    entity_category: diagnostic
text_sensor:
  # Current time sensor (to be displayed on screen)
  - platform: deduplicate_text
    name: "Current Time"
    id: current_time
    internal: true
    update_interval: ${clock_time_update_interval}
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    lambda: return id(ha_time).now().strftime("%H:%M");
  # Current date sensor (to be displayed on screen)
  - platform: deduplicate_text
    name: "Current Date"
    id: current_date
    internal: true
    update_interval: ${clock_date_update_interval}
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    lambda: return id(ha_time).now().strftime("%Y-%m-%d %a");
  # VOC level sensor
  - platform: deduplicate_text
    id: voc_level
    internal: true
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    lambda: |-
      if (id(ha_voc_level).has_state()) {
        return id(ha_voc_level).state;
      }
      return {};
  # CO2 level sensor
  - platform: deduplicate_text
    id: co2_level
    internal: true
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    lambda: |-
      if (id(ha_co2_level).has_state()) {
        return id(ha_co2_level).state;
      }
      return {};
  # PPM level sensor
  - platform: deduplicate_text
    id: ppm_level
    internal: true
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    lambda: |-
      if (id(ha_ppm_level).has_state()) {
        return id(ha_ppm_level).state;
      }
      return {};
  # Person state sensor (to determine deep sleep duration)
  - platform: deduplicate_text
    id: person_state
    internal: true
    lambda: |-
      if (id(ha_person_state).has_state()) {
        return id(ha_person_state).state;
      }
      return {};
  # Home Assistant proxy sensors (for the deduplicate_text sensors above)
  - platform: homeassistant
    id: ha_voc_level
    entity_id: ${air_quality_voc_level_sensor_id}
    internal: true
  - platform: homeassistant
    id: ha_co2_level
    entity_id: ${air_quality_co2_level_sensor_id}
    internal: true
  - platform: homeassistant
    id: ha_ppm_level
    entity_id: ${air_quality_ppm_level_sensor_id}
    internal: true
  - platform: homeassistant
    id: ha_person_state
    entity_id: ${person_sensor_id}
    internal: true

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: ${uptime_update_interval}
    entity_category: diagnostic
    disabled_by_default: true
  # Internal battery voltage sensor
  - platform: adc
    id: battery_voltage_int
    name: Battery Voltage Internal
    pin:
      number: GPIO4
    update_interval: 4sec
    unit_of_measurement: "V"
    accuracy_decimals: 2
    state_class: measurement
    device_class: voltage
    attenuation: 12db
    internal: true
    on_value:
      then:
        - if:
            condition:
              lambda: return !isnan(x);
            then:
              - lambda: |-
                  id(battery_voltage_change).publish_state(x);
                  id(battery_voltage).publish_state(x);
              - component.update: battery_level
    filters:
      - skip_initial: 5 #20
      - multiply: 2
      # Smooth out noise
      - sliding_window_moving_average:
          window_size: 20
          send_every: 5
          send_first_at: 3
      - lambda: |-
          if (x < 3.0) { // 3.0V is the minimum voltage for the battery to be considered somewhat valid
            return {};
          }

          return x;
      - lambda: |-
          auto last_battery_voltage_value = id(last_battery_voltage);

          bool is_voltage_spike = fabs(x - last_battery_voltage_value) >= ${battery_voltage_spike_threshold_v};
          id(last_battery_voltage) = x;

          if (is_voltage_spike) {
            return {};
          }

          return x;
      - lambda: |-
          // Get current time in seconds
          uint32_t now = millis() / 1000;
          float last_voltage = id(last_battery_publish_voltage);
          uint32_t last_time = id(last_battery_publish_time);

          id(last_battery_publish_time) = now;
          id(last_battery_publish_voltage) = x; 

          // If this is the first value, always publish
          if (last_time == 0) {
            return x;
          }

          // Calculate time difference in minutes
          float dt_min = (now - last_time) / 60.0;

          // Unable to calculate delta t
          // Avoid division by zero, return empty value
          if (dt_min <= 0) {
            return {};
          }

          // Calculate voltage difference
          float dv = fabs(x - last_voltage);

          // Calculate rate of change (V/min)
          float rate = dv / dt_min;
         
          // Only publish if rate is less than the configured limit
          if (rate < ${battery_voltage_rate_limit_v_per_min}) {
            // id(battery_voltage_change).publish_state(rate);
            return x;
          } else {
            return {};
          }
      - or:
          - throttle: 5min
          - delta: 0.01

  # Battery voltage sensor (to be displayed published to Home Assistant)
  - platform: template
    id: battery_voltage
    name: Battery Voltage
    # Published by internal battery voltage sensor
    update_interval: never
    unit_of_measurement: "V"
    accuracy_decimals: 2
    state_class: measurement
    device_class: voltage
  # Battery voltage change rate sensor (to be published to Home Assistant)
  # This sensor value is published by internal battery voltage sensor
  - platform: template
    id: battery_voltage_change
    name: Battery Voltage Change Rate
    update_interval: never
    unit_of_measurement: "V/min"
    entity_category: diagnostic
    disabled_by_default: true
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - lambda: |-
          uint32_t now = millis() / 1000;
          float last_voltage = id(last_battery_filtered_publish_voltage);
          uint32_t last_time = id(last_battery_filtered_publish_time);

          id(last_battery_filtered_publish_time) = now;
          id(last_battery_filtered_publish_voltage) = x;

          // If this is the first value, always publish
          if (last_time == 0) {
            return 0;
          }

          // Calculate time difference in minutes
          float dt_min = (now - last_time) / 60.0;
          if (dt_min <= 0) {
            // Unable to calculate delta t
            // Avoid division by zero, return empty value
            return {};
          }

          // Calculate voltage difference
          float dv = x - last_voltage;

          // Calculate rate of change (V/min)
          float rate = dv / dt_min;

          if (rate > 1.0 || rate < -1.0) {
            return {};
          }

          return rate;
  # Battery level sensor (to be displayed on screen and published to Home Assistant)
  - platform: template
    id: battery_level
    name: Battery Charge
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    device_class: battery
    update_interval: never
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    lambda: |-
      if (!id(battery_voltage_int).has_state()) {
        return {};
      }
      float v = id(battery_voltage_int).state;
      // Determine charging state based on voltage change rate
      bool charging = false;

      if (id(battery_voltage_change).has_state()) {
        float rate = id(battery_voltage_change).state;id(battery_voltage_change).state;
        charging = rate > ${battery_charging_rate_threshold_v_per_min} && v >= ${battery_level_int_charging_min_v}; // threshold for charging
      
        if (v < ${battery_level_int_charging_min_v} and id(battery_voltage_change).state < ${battery_level_int_charging_min_v} ) {
          charging = false;
        }

        if (v > ${battery_level_int_max_v} and v < ${battery_level_int_charging_min_v} and id(battery_voltage_change).state > ${battery_level_int_charging_min_v} ) {
          charging = true;
        }
      }

      id(is_charging).publish_state(charging);

      float min_v = charging ? ${battery_level_int_charging_min_v} : ${battery_level_int_min_v};
      float max_v = charging ? ${battery_level_int_charging_max_v} : ${battery_level_int_max_v};
   
      float result = (v - min_v) * 100.0 / (max_v - min_v);
      
      // If battery is charging and below or equal to 0%, return empty value
      if (charging && result <= 0) {
        return {};
      } 

      // If battery is below or equal to 0% and uptime is unknown or less than 5 minutes, return empty value
      if (result <= 0 && (!id(uptime_sensor).has_state() || id(uptime_sensor).state < 300)) {
        return {};
      }
      
      return result;
    
    filters:
      - clamp:
          min_value: 0
          max_value: 100
      - delta: 1
  # WiFi signal quartile sensor (for display logic)
  - platform: copy
    source_id: wifi_signal_proc
    id: wifi_signal_quart
    name: "WiFi Signal Quartile"
    unit_of_measurement: "quartile"
    accuracy_decimals: 0
    internal: true
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    #  update_interval: 60s
    filters:
      - lambda: return ceil(x / 25.0);
      - delta: 0.5
  # Temperature sensor
  - platform: homeassistant
    id: room_temperature
    entity_id: ${temperature_sensor_id}
    unit_of_measurement: °C
    internal: true
    filters:
      - or:
          - throttle: 5min
          - delta: 0.05
  # Humidity sensor
  - platform: homeassistant
    id: room_humidity
    entity_id: ${humidity_sensor_id}
    unit_of_measurement: "%"
    internal: true
    filters:
      - or:
          - throttle: 5min
          - delta: 0.5
  # Hausmull next collection sensor
  - platform: homeassistant
    id: hausmull
    attribute: daysTo
    entity_id: ${hausmull_sensor_id}
    unit_of_measurement: d
    internal: true
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    filters:
      - or:
          - throttle: 600min
          - delta: 0.5
  # Biomull next collection sensor
  - platform: homeassistant
    id: biomull
    attribute: daysTo
    entity_id: ${biomull_sensor_id}
    unit_of_measurement: d
    internal: true
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
    filters:
      - or:
          - throttle: 600min
          - delta: 0.5
  # Papier next collection sensor
  - platform: homeassistant
    id: papier
    attribute: daysTo
    unit_of_measurement: d
    entity_id: ${papier_sensor_id}
    internal: true
    on_value:
      then:
        - lambda: |-
            id(screen_is_out_of_sync) = true;
