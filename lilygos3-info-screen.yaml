  # Outdoor temperature sensor
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: ${outdoor_temperature_sensor_id}
    unit_of_measurement: °C
    internal: true
    filters:
      - or:
          - throttle: 5min
